<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroBrowser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --accent: #e94560;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --border: #2a2a4a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--bg-secondary);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .url-bar {
      flex: 1;
      display: flex;
      gap: 8px;
    }

    .url-input {
      flex: 1;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .url-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .browser-view {
      flex: 1;
      background: white;
      display: flex;
      flex-direction: column;
    }

    .browser-toolbar {
      background: var(--bg-secondary);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .browser-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 18px;
    }

    .sidebar {
      width: 350px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 90%;
      line-height: 1.5;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-tertiary);
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .loading {
      display: none;
      padding: 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .loading.active {
      display: block;
    }

    .status-bar {
      background: var(--bg-secondary);
      padding: 6px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 4px 4px 0 0;
      background: var(--bg-tertiary);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab.active {
      background: var(--accent);
    }

    .tab-close {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .tab-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">NeuroBrowser</div>
    <div class="url-bar">
      <input type="text" class="url-input" id="urlInput" placeholder="Enter URL and press Enter...">
      <button class="btn" id="goBtn">Go</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-id="0">
      <span>New Tab</span>
    </div>
  </div>

  <main>
    <div class="browser-view">
      <div class="browser-toolbar">
        <button class="btn btn-secondary" id="backBtn">←</button>
        <button class="btn btn-secondary" id="forwardBtn">→</button>
        <button class="btn btn-secondary" id="refreshBtn">↻</button>
      </div>
      <div class="browser-content" id="browserContent">
        Welcome to NeuroBrowser - Your AI-Native Browser Assistant
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">AI Assistant</div>
      <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
          Hello! I'm your AI browsing assistant. Ask me anything about the current page, or tell me what you'd like to find.
        </div>
      </div>
      <div class="loading" id="loading">Thinking...</div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="Ask about the page..."></textarea>
        <button class="btn" id="sendBtn">Send</button>
      </div>
    </div>
  </main>

  <div class="status-bar">
    <span id="statusText">Ready</span>
    <span>Tab 1 of 1</span>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatMessages = document.getElementById('chatMessages');
    const loading = document.getElementById('loading');
    const statusText = document.getElementById('statusText');
    const browserContent = document.getElementById('browserContent');

    let currentSessionId = null;
    let currentPageId = 0;

    async function initSession() {
      try {
        const { invoke } = window.__TAURI__.core;
        currentSessionId = await invoke('create_session');
        currentPageId = await invoke('create_page', { sessionId: currentSessionId });
        statusText.textContent = 'Session initialized';
      } catch (e) {
        console.error('Failed to init session:', e);
        statusText.textContent = 'Tauri not connected - running in demo mode';
      }
    }

    async function navigate() {
      const url = urlInput.value.trim();
      if (!url) return;

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        urlInput.value = 'https://' + url;
      }

      statusText.textContent = 'Loading...';
      
      try {
        const { invoke } = window.__TAURI__.core;
        await invoke('navigate', { 
          sessionId: currentSessionId, 
          pageId: currentPageId, 
          url: urlInput.value 
        });
        
        const pageInfo = await invoke('get_page_info', { 
          sessionId: currentSessionId, 
          pageId: currentPageId 
        });
        
        browserContent.textContent = `Loaded: ${pageInfo.title}`;
        statusText.textContent = 'Loaded';
      } catch (e) {
        browserContent.textContent = `Demo mode: Would navigate to ${urlInput.value}`;
        statusText.textContent = 'Demo mode';
      }
    }

    async function askAssistant() {
      const prompt = chatInput.value.trim();
      if (!prompt) return;

      chatInput.value = '';
      
      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.textContent = prompt;
      chatMessages.appendChild(userMsg);

      loading.classList.add('active');
      statusText.textContent = 'AI is thinking...';

      try {
        const { invoke } = window.__TAURI__.core;
        const response = await invoke('ask', { 
          sessionId: currentSessionId, 
          pageId: currentPageId, 
          prompt 
        });
        
        const assistantMsg = document.createElement('div');
        assistantMsg.className = 'message assistant';
        assistantMsg.textContent = response;
        chatMessages.appendChild(assistantMsg);
        
        statusText.textContent = 'Ready';
      } catch (e) {
        const assistantMsg = document.createElement('div');
        assistantMsg.className = 'message assistant';
        assistantMsg.textContent = `Demo response: I would ${prompt.toLowerCase()} (Tauri not connected)`;
        chatMessages.appendChild(assistantMsg);
        statusText.textContent = 'Demo mode';
      }

      loading.classList.remove('active');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    goBtn.addEventListener('click', navigate);
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') navigate();
    });

    sendBtn.addEventListener('click', askAssistant);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAssistant();
      }
    });

    initSession();
  </script>
</body>
</html>
