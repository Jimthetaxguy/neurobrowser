<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroBrowser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --accent: #e94560;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --border: #2a2a4a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--bg-secondary);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .provider-select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
    }

    .provider-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .url-bar {
      flex: 1;
      display: flex;
      gap: 8px;
    }

    .url-input {
      flex: 1;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .url-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .browser-view {
      flex: 1;
      background: white;
      display: flex;
      flex-direction: column;
    }

    .browser-toolbar {
      background: var(--bg-secondary);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .browser-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .browser-content iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }

    .page-stats {
      display: flex;
      gap: 16px;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      color: var(--accent);
      font-weight: 600;
    }

    .sidebar {
      width: 350px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 90%;
      line-height: 1.5;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-tertiary);
    }

    .tools-used {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .tool-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      margin-right: 4px;
      font-size: 10px;
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .loading {
      display: none;
      padding: 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .loading.active {
      display: block;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(26, 26, 46, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-message {
      background: var(--bg-secondary);
      padding: 24px 40px;
      border-radius: 8px;
      text-align: center;
    }

    .status-bar {
      background: var(--bg-secondary);
      padding: 6px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 4px 4px 0 0;
      background: var(--bg-tertiary);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab.active {
      background: var(--accent);
    }

    .tab-close {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .tab-close:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.2);
    }

    .new-tab-btn {
      padding: 4px 12px;
      border-radius: 4px;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
    }

    .new-tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-message">
      <div class="loading-spinner"></div>
      <div id="loadingMessage">Loading...</div>
    </div>
  </div>
  <header>
    <div class="logo">NeuroBrowser</div>
    <select class="provider-select" id="providerSelect">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="ollama">Ollama</option>
    </select>
    <div class="url-bar">
      <input type="text" class="url-input" id="urlInput" placeholder="Enter URL and press Enter...">
      <button class="btn" id="goBtn">Go</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-id="0">
      <span>New Tab</span>
    </div>
  </div>

  <main>
    <div class="browser-view">
      <div class="browser-toolbar">
        <button class="btn btn-secondary" id="backBtn">←</button>
        <button class="btn btn-secondary" id="forwardBtn">→</button>
        <button class="btn btn-secondary" id="refreshBtn">↻</button>
      </div>
      <div class="page-stats" id="pageStats">
        <div class="stat">Links: <span class="stat-value" id="linkCount">0</span></div>
        <div class="stat">Images: <span class="stat-value" id="imageCount">0</span></div>
        <div class="stat">Forms: <span class="stat-value" id="formCount">0</span></div>
        <div class="stat">Prices: <span class="stat-value" id="priceCount">0</span></div>
      </div>
      <div class="browser-content" id="browserContent">
        <iframe id="contentFrame" sandbox="allow-same-origin allow-scripts allow-forms" title="Page Content"></iframe>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">AI Assistant</div>
      <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
          Hello! I'm your AI browsing assistant. Ask me anything about the current page, or tell me what you'd like to
          find.
        </div>
      </div>
      <div class="loading" id="loading">Thinking...</div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="Ask about the page..."></textarea>
        <button class="btn" id="sendBtn">Send</button>
      </div>
    </div>
  </main>

  <div class="status-bar">
    <span id="statusText">Ready</span>
    <span>Tab 1 of 1</span>
  </div>

  <script>
    // Polyfill or ensure __TAURI__ exists for local dev if web build fails to inject
    window.__TAURI__ = window.__TAURI__ || {};
    window.__TAURI__.core = window.__TAURI__.core || {
      invoke: async (cmd, args = {}) => {
        console.warn(`[Mock Tauri] Called ${cmd} with`, args);
        if (cmd === 'create_session') return 'mock-session-id';
        if (cmd === 'create_page') return 0;
        if (cmd === 'get_page_info') return { title: 'Mock Page', html: '<h1>Mock Content</h1>', link_count: 0, image_count: 0, form_count: 0, price_count: 0 };
        throw new Error('Tauri API not available - running in browser mode without backend.');
      }
    };

    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatMessages = document.getElementById('chatMessages');
    const loading = document.getElementById('loading');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingMessage = document.getElementById('loadingMessage');
    const statusText = document.getElementById('statusText');
    const browserContent = document.getElementById('browserContent');
    const contentFrame = document.getElementById('contentFrame');
    const linkCount = document.getElementById('linkCount');
    const imageCount = document.getElementById('imageCount');
    const formCount = document.getElementById('formCount');
    const priceCount = document.getElementById('priceCount');

    function showLoading(message = 'Loading...') {
      loadingMessage.textContent = message;
      loadingOverlay.classList.add('active');
    }

    function hideLoading() {
      loadingOverlay.classList.remove('active');
    }

    let currentSessionId = null;
    let currentPageId = 0;
    let currentProvider = 'openai';

    async function initSession() {
      try {
        const { invoke } = window.__TAURI__.core;
        currentSessionId = await invoke('create_session');
        currentPageId = await invoke('create_page', { sessionId: currentSessionId });
        statusText.textContent = 'Session initialized';
      } catch (e) {
        console.error('Failed to init session:', e);
        statusText.textContent = 'Tauri not connected - running in demo mode';
      }
    }

    async function navigate() {
      let url = urlInput.value.trim();
      if (!url) return;

      statusText.textContent = 'Validating URL...';

      try {
        const { invoke } = window.__TAURI__.core;

        // Validate URL first
        const validation = await invoke('validate_url', { url });

        if (!validation.valid) {
          statusText.textContent = 'Error: ' + (validation.error || 'Invalid URL');
          browserContent.innerHTML = `<div style="padding: 40px; text-align: center; color: #c00;">
            <h2>Invalid URL</h2>
            <p>${validation.error || 'The URL format is invalid'}</p>
          </div>`;
          return;
        }

        urlInput.value = validation.normalized_url;
        showLoading('Navigating to ' + validation.normalized_url + '...');

        await invoke('navigate', {
          sessionId: currentSessionId,
          pageId: currentPageId,
          url: validation.normalized_url
        });

        const pageInfo = await invoke('get_page_info', {
          sessionId: currentSessionId,
          pageId: currentPageId
        });

        // Render HTML content in iframe
        if (pageInfo.html) {
          let htmlContent = pageInfo.html;

          // Inject base tag for relative assets
          if (!htmlContent.match(/<base\s/i) && htmlContent.match(/<head>/i)) {
            htmlContent = htmlContent.replace(/<head>/i, `<head><base href="${pageInfo.url}">`);
          } else if (!htmlContent.match(/<base\s/i)) {
            htmlContent = `<base href="${pageInfo.url}">` + htmlContent;
          }

          // Inject script to route link clicks back to Tauri MVP engine
          htmlContent += `
            <script>
              document.addEventListener('click', (e) => {
                const a = e.target.closest('a');
                if (a && a.href) {
                  e.preventDefault();
                  window.parent.postMessage({ type: 'navigate', url: a.href }, '*');
                }
              });
              document.addEventListener('submit', (e) => {
                e.preventDefault();
                window.parent.postMessage({ type: 'form_submit', msg: 'Form submissions not yet supported in MVP' }, '*');
              });
            <\/script>
          `;

          const blob = new Blob([htmlContent], { type: 'text/html' });
          const blobUrl = URL.createObjectURL(blob);
          contentFrame.src = blobUrl;
        }

        // Update stats
        linkCount.textContent = pageInfo.link_count || 0;
        imageCount.textContent = pageInfo.image_count || 0;
        formCount.textContent = pageInfo.form_count || 0;
        priceCount.textContent = pageInfo.price_count || 0;

        hideLoading();
        statusText.textContent = 'Loaded: ' + pageInfo.title;
      } catch (e) {
        hideLoading();
        const errorMsg = e.message || String(e);
        statusText.textContent = 'Error: ' + errorMsg;
        browserContent.innerHTML = `<div style="padding: 40px; text-align: center; color: #c00;">
          <h2>Navigation Error</h2>
          <p>${errorMsg}</p>
          <p style="font-size: 12px; margin-top: 20px;">Running in demo mode - Tauri connection may not be available</p>
        </div>`;
      }
    }

    async function askAssistant() {
      const prompt = chatInput.value.trim();
      if (!prompt) return;

      chatInput.value = '';

      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.textContent = prompt;
      chatMessages.appendChild(userMsg);

      showLoading('AI is thinking...');

      try {
        const { invoke } = window.__TAURI__.core;
        const result = await invoke('ask', {
          sessionId: currentSessionId,
          pageId: currentPageId,
          prompt
        });

        const assistantMsg = document.createElement('div');
        assistantMsg.className = 'message assistant';
        assistantMsg.innerHTML = `<div>${result.response}</div>`;

        // Show tools used if any
        if (result.tools_used && result.tools_used.length > 0) {
          const toolsDiv = document.createElement('div');
          toolsDiv.className = 'tools-used';
          toolsDiv.innerHTML = 'Tools: ' + result.tools_used
            .map(t => `<span class="tool-badge">${t}</span>`)
            .join('');
          assistantMsg.appendChild(toolsDiv);
        }

        chatMessages.appendChild(assistantMsg);

        hideLoading();
        statusText.textContent = 'Ready';
      } catch (e) {
        hideLoading();
        const assistantMsg = document.createElement('div');
        assistantMsg.className = 'message assistant';
        assistantMsg.textContent = `Demo response: I would ${prompt.toLowerCase()} (Tauri not connected)`;
        chatMessages.appendChild(assistantMsg);
        statusText.textContent = 'Demo mode';
      }

      loading.classList.remove('active');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    goBtn.addEventListener('click', navigate);
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') navigate();
    });

    sendBtn.addEventListener('click', askAssistant);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAssistant();
      }
    });

    // Handle iframe messages
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'navigate') {
        urlInput.value = e.data.url;
        navigate();
      } else if (e.data && e.data.type === 'form_submit') {
        statusText.textContent = e.data.msg;
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Ctrl+T: New tab
      if (e.ctrlKey && e.key === 't') {
        e.preventDefault();
        createNewTab();
      }
      // Ctrl+W: Close tab
      if (e.ctrlKey && e.key === 'w') {
        e.preventDefault();
        closeCurrentTab();
      }
      // Ctrl+L: Focus URL bar
      if (e.ctrlKey && e.key === 'l') {
        e.preventDefault();
        urlInput.focus();
        urlInput.select();
      }
      // Ctrl+Enter in URL bar: Navigate
      if (e.ctrlKey && e.key === 'Enter' && document.activeElement === urlInput) {
        e.preventDefault();
        navigate();
      }
    });

    async function createNewTab() {
      try {
        const { invoke } = window.__TAURI__.core;
        const newPageId = await invoke('create_page', { sessionId: currentSessionId });
        currentPageId = newPageId;

        const tab = document.createElement('div');
        tab.className = 'tab active';
        tab.dataset.id = newPageId;
        tab.innerHTML = `<span>New Tab</span>`;
        document.getElementById('tabs').appendChild(tab);
      } catch (e) {
        console.log('Demo mode: would create new tab');
      }
    }

    async function closeCurrentTab() {
      if (document.querySelectorAll('.tab').length <= 1) return; // Don't close last tab

      try {
        const { invoke } = window.__TAURI__.core;
        await invoke('close_page', { sessionId: currentSessionId, pageId: currentPageId });

        // Remove tab from UI
        const tabElement = document.querySelector(`.tab[data-id="${currentPageId}"]`);
        if (tabElement) {
          tabElement.remove();
        }

        // Switch to first available tab
        const firstTab = document.querySelector('.tab');
        if (firstTab) {
          currentPageId = parseInt(firstTab.dataset.id);
          firstTab.classList.add('active');
        }
      } catch (e) {
        console.log('Demo mode: would close tab');
      }
    }

    initSession();
  </script>
</body>

</html>
